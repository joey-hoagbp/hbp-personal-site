server:
  port: 8080

spring:
  application:
    name: hbp-personal-site
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hbp_personal_site}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Comma-separated list of origins allowed to call the API (the Next.js frontend).
app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:}
    to: ${APP_MAIL_TO:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
